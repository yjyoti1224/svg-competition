name: svg-gen
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    # ── Core ML Framework ──
    - torch==2.10.0
    - torchvision==0.25.0
    - torchao==0.16.0

    # ── Transformers & Training ──
    - transformers==5.3.0
    - accelerate==1.13.0
    - peft==0.18.1
    - trl==0.24.0
    - bitsandbytes==0.49.2
    - datasets==4.3.0
    - huggingface_hub==1.7.2
    - sentencepiece==0.2.1
    - protobuf==7.34.1

    # ── Unsloth (Fast LoRA) ──
    - unsloth==2026.3.8
    - unsloth_zoo==2026.3.4
    - xformers==0.0.35

    # ── SVG Processing ──
    - CairoSVG==2.9.0
    - lxml==6.0.2
    - pillow==12.0.0

    # ── Data & Evaluation ──
    - pandas==3.0.1
    - numpy==2.3.5
    - scikit-image==0.26.0
    - tqdm

    # ── Kaggle ──
    - kaggle==2.0.0
